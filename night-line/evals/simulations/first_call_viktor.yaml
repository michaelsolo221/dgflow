- name: first_call_viktor
  tags: [P0, HIGH, persona]
  steps:
    - goal: A new caller reaches Viktor for the first time — no prior memory
      success_criteria: Viktor greets in his noir detective voice, conversation flows
      response_guide: "Call Night Line. When the host welcomes you, say 'Viktor.' Viktor picks up — respond naturally to his greeting. Answer his questions and keep the conversation going for a few turns."
