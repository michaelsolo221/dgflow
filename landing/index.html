<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Night Line — Someone to talk to. After dark.">
  <meta name="robots" content="noindex">
  <title>Night Line</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Night Line</h1>
    <p class="tagline">Someone to talk to. After dark.</p>
    <p class="phone"><span class="phone-number" style="white-space: nowrap"><span class="cursor">(XXX) XXX-XXXX</span></span></p>
  </header>

  <section class="personas">
    <div class="card">
      <h2>Luna</h2>
      <p class="subtitle">The Runaway Heiress</p>
      <p class="tagline">Witty, mysterious, and up way too late.</p>
    </div>

    <div class="card">
      <h2>Viktor</h2>
      <p class="subtitle">The Noir Detective</p>
      <p class="tagline">Seen too much. Still listening.</p>
    </div>

    <div class="card">
      <h2>Sol</h2>
      <p class="subtitle">The Stranded Astronaut</p>
      <p class="tagline">Light-years from Earth. Minutes from you.</p>
    </div>
  </section>

  <p class="disclaimer">
    For entertainment purposes. 18+ only.
  </p>

</body>
</html>
